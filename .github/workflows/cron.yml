name: CRON

on:
  schedule:
    - cron: '*/30 * * * *' # Ejecutar cada 30 minutos
  workflow_dispatch:
    inputs:
      region:
        description: 'Región a ejecutar (vacío = todas)'
        required: false
        type: choice
        options:
          - ''
          - ve
        default: ''

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Create .env file
        run: |
          touch .env
          echo "VITE_AXIOM_ORG_ID=${{ secrets.VITE_AXIOM_ORG_ID }}" >> .env
          echo "VITE_AXIOM_TOKEN=${{ secrets.VITE_AXIOM_TOKEN }}" >> .env
          echo "VITE_AXIOM_DATASET=${{ secrets.VITE_AXIOM_DATASET }}" >> .env
          echo "VITE_GITHUB_TOKEN=${{ secrets.VITE_GITHUB_TOKEN }}" >> .env
          echo "VITE_API_KEY=${{ secrets.VITE_API_KEY }}" >> .env
          echo "VITE_DATABASE_URL=${{ secrets.VITE_DATABASE_URL }}" >> .env
          echo "VITE_DATABASE_AUTH_TOKEN=${{ secrets.VITE_DATABASE_AUTH_TOKEN }}" >> .env

      - name: Install dependencies
        run: bun install

      - name: Build cron
        run: bun run cron:build

      - name: Run cron
        run: bun run cron:run
        env:
          CRON_REGION: ${{ inputs.region || 've' }}
          VITE_DATABASE_URL: ${{ secrets.VITE_DATABASE_URL }}
          VITE_DATABASE_AUTH_TOKEN: ${{ secrets.VITE_DATABASE_AUTH_TOKEN }}

      - name: Commit and push if changes
        run: |
          git config --global user.name 'GitHub Actions'
          git config --global user.email 'actions@github.com'
          
          git add -A
          timestamp=$(date -u)
          git commit -m "chore: update data $timestamp [skip ci]" || echo "No changes to commit"
          git push
